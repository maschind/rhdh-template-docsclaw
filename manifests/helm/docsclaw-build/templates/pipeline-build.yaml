apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: {{ include "docsclaw-build.name" . }}-build
  labels:
    {{- include "docsclaw-build.labels" . | nindent 4 }}
spec:
  params:
    - name: source-repo
      description: source repo that contains the application code
      type: string
      default: {{ .Values.git.repo }}
    - name: source-branch
      description: source branch to build from
      default: {{ .Values.git.branch }}
      type: string
    - name: dockerfile
      type: string
      default: {{ .Values.image.dockerfile }}
    - name: output-image
      type: string
      default: {{ include "image.dev-url" . }}
    - name: dockerfile-ui
      type: string
      default: {{ .Values.image.dockerfileUI }}
    - name: output-image-ui
      type: string
      default: {{ include "image.dev-url-ui" . }}
  tasks:
    - name: git-clone
      params:
        - name: URL
          value: $(params.source-repo)
        - name: REVISION
          value: $(params.source-branch)
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      workspaces:
        - name: output
          workspace: source-folder
    - name: build-and-push-image
      runAfter:
        - git-clone
      params:
        - name: DOCKERFILE
          value: $(params.dockerfile)
        - name: IMAGE
          value: $(params.output-image)
{{- if not (eq .Values.image.registry "Quay") }}
        - name: TLSVERIFY
          value: 'false'
{{- end }}
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: {{ .Release.Namespace }}
      workspaces:
        - name: source
          workspace: source-folder
    - name: build-and-push-chat-ui
      runAfter:
        - git-clone
      params:
        - name: CONTEXT
          value: ./chat-ui
        - name: DOCKERFILE
          value: ./chat-ui/Dockerfile
        - name: IMAGE
          value: $(params.output-image-ui)
{{- if not (eq .Values.image.registry "Quay") }}
        - name: TLSVERIFY
          value: 'false'
{{- end }}
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: {{ .Release.Namespace }}
      workspaces:
        - name: source
          workspace: source-folder
    - name: resync
      runAfter:
        - build-and-push-image
        - build-and-push-chat-ui
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: resync
          - name: namespace
            value: {{ .Release.Namespace }}
  workspaces:
    - name: source-folder
