apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "docsclaw-template.name" . }}
  labels:
    {{- include "docsclaw-template.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "docsclaw-template.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "docsclaw-template.selectorLabels" . | nindent 8 }}
        {{- include "backstage.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "docsclaw-template.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "docsclaw-template.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            - --config-dir
            - /config/agent
            - --listen-plain-http
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
          env:
            - name: LLM_PROVIDER
              value: {{ .Values.llm.provider | quote }}
            - name: LLM_MODEL
              value: {{ .Values.llm.model | quote }}
            {{- if .Values.llm.baseUrl }}
            - name: LLM_BASE_URL
              value: {{ .Values.llm.baseUrl | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "docsclaw-template.name" . }}-llm-secret
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: agent-config
              mountPath: /config/agent/system-prompt.txt
              subPath: system-prompt.txt
              readOnly: true
            - name: agent-config
              mountPath: /config/agent/agent-card.json
              subPath: agent-card.json
              readOnly: true
            {{- if or (eq .Values.agent.mode "with-tools") (eq .Values.agent.preset "research-assistant") (eq .Values.agent.preset "document-researcher") }}
            - name: agent-config
              mountPath: /config/agent/agent-config.yaml
              subPath: agent-config.yaml
              readOnly: true
            {{- end }}
            {{- if .Values.agent.promptVariants }}
            - name: agent-config
              mountPath: /config/agent/prompts.json
              subPath: prompts.json
              readOnly: true
            {{- end }}
            - name: workspace
              mountPath: /tmp/agent-workspace
      volumes:
        - name: agent-config
          configMap:
            name: {{ include "docsclaw-template.name" . }}-config
        - name: workspace
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
