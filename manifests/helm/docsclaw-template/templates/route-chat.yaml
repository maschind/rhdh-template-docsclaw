{{- if .Values.chatUI.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "docsclaw-template.name" . }}-chat
  labels:
    {{- include "docsclaw-template.labels" . | nindent 4 }}
    app.kubernetes.io/component: chat-ui
  annotations:
    haproxy.router.openshift.io/timeout: 120s
spec:
  port:
    targetPort: http
  to:
    kind: Service
    name: {{ include "docsclaw-template.name" . }}-chat
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
