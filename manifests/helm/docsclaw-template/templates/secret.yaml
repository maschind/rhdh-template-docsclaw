{{- if eq .Values.image.registry "Quay" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "docsclaw-template.name" . }}-registry-creds-app
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "username": "{{ .Values.image.organization }}",
      "password": "{{ .Values.image.password }}",
      "auths": {
        "{{ .Values.image.host }}": {
          "auth": "{{ include "quay.auth" . }}"
        }
      }
    }
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "docsclaw-template.name" . }}-llm-secret
  labels:
    {{- include "docsclaw-template.labels" . | nindent 4 }}
type: Opaque
stringData:
  LLM_API_KEY: {{ .Values.llm.apiKey | quote }}
