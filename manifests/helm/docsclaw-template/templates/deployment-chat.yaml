{{- if .Values.chatUI.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "docsclaw-template.name" . }}-chat
  labels:
    {{- include "docsclaw-template.labels" . | nindent 4 }}
    app.kubernetes.io/component: chat-ui
spec:
  replicas: {{ .Values.chatUI.replicaCount }}
  selector:
    matchLabels:
      {{- include "docsclaw-template.chatUI.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "docsclaw-template.chatUI.selectorLabels" . | nindent 8 }}
        {{- include "backstage.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: chat-ui
          image: {{ include "docsclaw-template.chatUI.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: AGENT_SERVICE
              value: {{ include "docsclaw-template.name" . }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.chatUI.resources | nindent 12 }}
          volumeMounts:
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
