{{- with .Values.route }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  labels:
    {{- include "docsclaw-template.labels" $ | nindent 4 }}
  name: {{ include "docsclaw-template.name" $ }}
  annotations:
    haproxy.router.openshift.io/timeout: 120s
spec:
  {{- if .host }}
  host: {{ .host }}
  {{- end }}
  {{- if .path }}
  path: {{ .path }}
  {{- end }}
  port:
    targetPort: http
  to:
    kind: Service
    name: {{ include "docsclaw-template.name" $ }}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
