apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "docsclaw-template.name" . }}-config
  labels:
    {{- include "docsclaw-template.labels" . | nindent 4 }}
data:
  system-prompt.txt: |
    {{- .Values.agent.systemPrompt | nindent 4 }}
  {{- if .Values.agent.agentCard }}
  agent-card.json: |
    {{- .Values.agent.agentCard | nindent 4 }}
  {{- else }}
  agent-card.json: |
    {
      "name": {{ include "docsclaw-template.name" . | quote }},
      "description": "DocsClaw AI Agent",
      "version": "1.0.0",
      "protocolVersion": "0.3.0",
      "url": "http://{{ include "docsclaw-template.name" . }}:{{ .Values.service.port }}",
      "skills": [],
      "capabilities": {},
      "defaultInputModes": ["application/json"],
      "defaultOutputModes": ["text/plain"]
    }
  {{- end }}
  {{- if or (eq .Values.agent.mode "with-tools") (eq .Values.agent.preset "research-assistant") (eq .Values.agent.preset "document-researcher") }}
  agent-config.yaml: |
    tools:
      allowed:
        - exec
        - web_fetch
        - read_file
        - write_file
    {{- if eq .Values.agent.preset "document-researcher" }}
        - fetch_document
      web_fetch:
        allowed_hosts:
          - ".s3.amazonaws.com"
          - ".svc.cluster.local"
    {{- end }}
      exec:
        timeout: 30
        max_output: 50000
      workspace: /tmp/agent-workspace
    loop:
      max_iterations: 10
  {{- end }}
  {{- if .Values.agent.promptVariants }}
  prompts.json: |
    {{- .Values.agent.promptVariants | nindent 4 }}
  {{- end }}
