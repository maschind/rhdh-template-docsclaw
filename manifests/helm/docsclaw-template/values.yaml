replicaCount: 1

image:
  pullPolicy: Always
  registry:
  host:
  organization:
  name:
  tag:
  password:

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8000
  healthPort: 8100

route:
  host: ""
  path: /

livenessProbe:
  httpGet:
    path: /health
    port: health
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3

readinessProbe:
  httpGet:
    path: /ready
    port: health
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 3

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

user:

llm:
  provider: anthropic
  model: claude-sonnet-4-6
  baseUrl: ""
  apiKey: ""

agent:
  systemPrompt: "You are a helpful assistant."
  mode: standalone
